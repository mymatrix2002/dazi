<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义打字练习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .char-correct { color: #10b981; }
        .char-wrong { color: #ef4444; background-color: #fecaca; border-radius: 2px; }
        .char-current { border-bottom: 2px solid #3b82f6; animation: blink 1s infinite; }
        .char-pending { color: #6b7280; }
        .sentence-speaking { background-color: #dbeafe; border-radius: 3px; }
        
        @keyframes blink {
            0%, 50% { border-color: #3b82f6; }
            51%, 100% { border-color: transparent; }
        }
        
        textarea:focus { outline: none; }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        #displayArea {
            white-space: pre-wrap;
            overflow-wrap: break-word;
            word-break: normal;
            overflow-x: hidden;
            word-wrap: break-word;
        }

        .header-title {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .header-title h1 {
            margin: 0;
        }
        .version-info {
            color: #94a3b8;
            font-size: 14px;
            font-weight: normal;
            user-select: none;
        }

        .btn-speaking {
            background-color: #3b82f6 !important;
            color: white !important;
        }

        #speechRate {
            background-color: #f1f5f9;
            border: none;
            outline: none;
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
            color: #334155;
            vertical-align: middle;
        }
        #speechRate:hover {
            background-color: #e2e8f0;
        }

        /* 自定义模态弹窗样式 */
        .modal-mask {
            position: fixed;
            inset: 0;
            background-color: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-box {
            background: white;
            border-radius: 12px;
            padding: 32px;
            max-width: 520px;
            width: 90%;
        }
        .modal-buttons {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            margin-top: 28px;
        }
        .modal-btn-ok {
            padding: 10px 28px;
            background-color: #3b82f6;
            color: white;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
        .modal-btn-cancel {
            padding: 10px 28px;
            background-color: #e5e7eb;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 max-w-5xl mx-auto">

    <div class="flex justify-center gap-3">

    <script>
        // ========== 百度翻译配置 ==========
        const BAIDU_APPID = '';
        const BAIDU_SECRET = '';
        // =================================

        // 朗读停顿时长配置（毫秒）
        const PAUSE_CONFIG = {
            period: 700,
            mark: 400,
            newline: 150
        };
        let pauseTimer = null;
        let speechUtterance = null;
        let pendingText = '';

        // 数字转英文
        function numberToEnglish(num) {
            const ones = ["zero", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine",
                "ten", "eleven", "twelve", "thirteen", "fourteen", "fifteen", "sixteen",
                "seventeen", "eighteen", "nineteen"];
            const tens = ["", "", "twenty", "thirty", "forty", "fifty", "sixty", "seventy", "eighty", "ninety"];
            if (num < 20) return ones[num];
            if (num < 100) {
                const ten = Math.floor(num / 10);
                const one = num % 10;
                return one > 0 ? `${tens[ten]}-${ones[one]}` : tens[ten];
            }
            if (num < 1000) {
                const hundred = Math.floor(num / 100);
                const rem = num % 100;
                let res = `${ones[hundred]} hundred`;
                if (rem > 0) res += " " + numberToEnglish(rem);
                return res;
            }
            return String(num);
        }

        function replaceDigitsToEnglish(text) {
            return text.replace(/\d+/g, m => numberToEnglish(parseInt(m)));
        }

        // ========= 已修复：a弱读增加单词边界，不会篡改we'll/I'll等缩写 =========
        function fixArticleAReduction(text) {
            // 仅匹配独立单词 a，前后有单词边界，不会进入缩写内部
            text = text.replace(/\b a \b([bcdfghjklmnpqrstvwBCDFGHJKLMNPQRSTVW])/g, ' uh $1');
            text = text.replace(/^\ba\s+([bcdfghjklmnpqrstvwBCDFGHJKLMNPQRSTVW])/gm, 'uh $1');
            return text;
        }

        // ========= 已修复：分句前保护英文缩写，避免拆分we'll/she'll/I'll =========
        function splitSentences(text) {
            const tempMap = new Map();
            let tempIdx = 0;
            // 匹配所有常见英文缩写 'll / 're / 's / 't / 've / 'd
            text = text.replace(/\w+'(ll|re|s|t|ve|d)/g, (match) => {
                const key = `__ABBR_TMP_${tempIdx}__`;
                tempMap.set(key, match);
                tempIdx++;
                return key;
            });

            const sentences = [];
            const reg = /[^.!?\n]+[.!?]+(?=\s|$|\n)|[^.!?\n]+\n|.+/g;
            let match;
            while ((match = reg.exec(text)) !== null) {
                let stext = match[0];
                // 还原缩写占位符
                for (const [key, val] of tempMap) {
                    stext = stext.replace(key, val);
                }
                let pauseType = 'newline';
                const lastC = stext.trimEnd().slice(-1);
                if (lastC === '.') pauseType = 'period';
                else if (lastC === '!' || lastC === '?') pauseType = 'mark';
                sentences.push({ text: stext, pauseType });
            }
            if (sentences.length === 0 && text.length > 0) {
                let restoreText = text;
                for (const [key, val] of tempMap) {
                    restoreText = restoreText.replace(key, val);
                }
                sentences.push({ text: restoreText, pauseType: 'newline' });
            }
            return sentences;
        }

        function createUtterance(rawText, rate) {
            const ut = new SpeechSynthesisUtterance();
            ut.rate = rate;
            ut.pitch = 1.0;
            const isCN = /[\u4e00-\u9fa5]/.test(rawText);
            if (isCN) {
                ut.lang = 'zh-CN';
                ut.text = rawText;
            } else {
                ut.lang = 'en-US';
                let t = replaceDigitsToEnglish(rawText);
                t = fixArticleAReduction(t);
                ut.text = t;
            }
            return ut;
        }

        // MD5 翻译加密
        function md5(str) {
            function rotateLeft(v, s) { return (v << s) | (v >>> (32 - s)); }
            function addUnsigned(x, y) {
                const x8 = x & 0x80000000;
                const y8 = y & 0x80000000;
                const x4 = x & 0x40000000;
                const y4 = y & 0x40000000;
                let res = (x & 0x3FFFFFFF) + (y & 0x3FFFFFFF);
                if (x4 & y4) return res ^ 0x80000000 ^ x8 ^ y8;
                if (x4 | y4) return (res & 0x40000000) ? (res ^ 0xC0000000 ^ x8 ^ y8) : (res ^ 0x40000000 ^ x8 ^ y8);
                return res ^ x8 ^ y8;
            }
            function F(x,y,z){return (x&y)|((~x)&z);}
            function G(x,y,z){return (x&z)|(y&(~z));}
            function H(x,y,z){return x^y^z;}
            function I(x,y,z){return y^(x|(~z));}
            function FF(a,b,c,d,x,s,ac){
                a=addUnsigned(a, addUnsigned(addUnsigned(F(b,c,d),x),ac));
                return addUnsigned(rotateLeft(a,s),b);
            }
            function GG(a,b,c,d,x,s,ac){
                a=addUnsigned(a, addUnsigned(addUnsigned(G(b,c,d),x),ac));
                return addUnsigned(rotateLeft(a,s),b);
            }
            function HH(a,b,c,d,x,s,ac){
                a=addUnsigned(a, addUnsigned(addUnsigned(H(b,c,d),x),ac));
                return addUnsigned(rotateLeft(a,s),b);
            }
            function II(a,b,c,d,x,s,ac){
                a=addUnsigned(a, addUnsigned(addUnsigned(I(b,c,d),x),ac));
                return addUnsigned(rotateLeft(a,s),b);
            }
            function strToWordArray(s){
                let wCount = (((s.length + 8) - ((s.length + 8) % 64)) / 64 + 1) * 16;
                let wa = new Array(wCount).fill(0);
                let bytePos = 0, charIdx = 0;
                while(charIdx < s.length){
                    let off = (charIdx % 4) * 8;
                    wa[bytePos] |= (s.charCodeAt(charIdx) & 0xFF) << off;
                    charIdx++;
                    if(off === 24) bytePos++;
                }
                let off = (charIdx % 4) * 8;
                wa[bytePos] |= (0x80 & 0xFF) << off;
                wa[wCount - 2] = s.length * 8;
                return wa;
            }
            function wordToHex(v){
                let hex = '';
                for(let i=0;i<=3;i++){
                    let b = (v >>> (i*8)) & 0xFF;
                    hex += ('0' + b.toString(16)).slice(-2);
                }
                return hex;
            }
            s = unescape(encodeURIComponent(str));
            let wa = strToWordArray(s);
            let a = 0x67452301, b = 0xEFCDAB89, c = 0x98BADCFE, d = 0x10325476;
            for(let k=0;k<wa.length;k+=16){
                let AA=a, BB=b, CC=c, DD=d;
                a=FF(a,b,c,d,wa[k+0],7,0xD76AA478);
                d=FF(d,a,b,c,wa[k+1],12,0xE8C7B756);
                c=FF(c,d,a,b,wa[k+2],17,0x242070DB);
                b=FF(b,c,d,a,wa[k+3],22,0xC1BDCEEE);
                a=FF(a,b,c,d,wa[k+4],7,0xF57C0FAF);
                d=FF(d,a,b,c,wa[k+5],12,0x4787C62A);
                c=FF(c,d,a,b,wa[k+6],17,0xA8304613);
                b=FF(b,c,d,a,wa[k+7],22,0xFD469501);
                a=FF(a,b,c,d,wa[k+8],7,0x698098D8);
                d=FF(d,a,b,c,wa[k+9],12,0x8B44F7AF);
                c=FF(c,d,a,b,wa[k+10],17,0xFFFF5BB1);
                b=FF(b,c,d,a,wa[k+11],22,0x895CD7BE);
                a=FF(a,b,c,d,wa[k+12],7,0x6B901122);
                d=FF(d,a,b,c,wa[k+13],12,0xFD987193);
                c=FF(c,d,a,b,wa[k+14],17,0xA679438E);
                b=FF(b,c,d,a,wa[k+15],22,0x49B40821);
                a=GG(a,b,c,d,wa[k+1],5,0xF61E2562);
                d=GG(d,a,b,c,wa[k+6],9,0xC040B340);
                c=GG(c,d,a,b,wa[k+11],14,0x265E5A51);
                b=GG(b,c,d,a,wa[k+0],20,0xE9B6C7AA);
                a=GG(a,b,c,d,wa[k+5],5,0xD62F105D);
                d=GG(d,a,b,c,wa[k+10],9,0x02441453);
                c=GG(c,d,a,b,wa[k+15],14,0xD8A1E681);
                b=GG(b,c,d,a,wa[k+4],20,0xE7D3FBC8);
                a=GG(a,b,c,d,wa[k+9],5,0x21E1CDE6);
                d=GG(d,a,b,c,wa[k+14],9,0xC33707D6);
                c=GG(c,d,a,b,wa[k+3],14,0xF4D50D87);
                b=GG(b,c,d,a,wa[k+8],20,0x455A14ED);
                a=GG(a,b,c,d,wa[k+13],5,0xA9E3E905);
                d=GG(d,a,b,c,wa[k+2],9,0xFCEFA3F8);
                c=GG(c,d,a,b,wa[k+7],14,0x676F02D9);
                b=GG(b,c,d,a,wa[k+12],20,0x8D2A4C8A);
                a=HH(a,b,c,d,wa[k+5],4,0xFFFA3942);
                d=HH(d,a,b,c,wa[k+8],11,0x8771F681);
                c=HH(c,d,a,b,wa[k+11],16,0x6D9D6122);
                b=HH(b,c,d,a,wa[k+14],23,0xFDE5380C);
                a=HH(a,b,c,d,wa[k+1],4,0xA4BEEA44);
                d=HH(d,a,b,c,wa[k+4],11,0x4BDECFA9);
                c=HH(c,d,a,b,wa[k+7],16,0xF6BB4B60);
                b=HH(b,c,d,a,wa[k+10],23,0xBEBFBC70);
                a=HH(a,b,c,d,wa[k+13],4,0x289B7EC6);
                d=HH(d,a,b,c,wa[k+0],11,0xEAA127FA);
                c=HH(c,d,a,b,wa[k+3],16,0xD4EF3085);
                b=HH(b,c,d,a,wa[k+6],23,0x04881D05);
                a=HH(a,b,c,d,wa[k+9],4,0xD9D4D039);
                d=HH(d,a,b,c,wa[k+12],11,0xE6DB99E5);
                c=HH(c,d,a,b,wa[k+15],16,0x1FA27CF8);
                b=HH(b,c,d,a,wa[k+2],23,0xC4AC5665);
                a=II(a,b,c,d,wa[k+0],6,0xF4292244);
                d=II(d,a,b,c,wa[k+7],10,0x432AFF97);
                c=II(c,d,a,b,wa[k+14],15,0xAB9423A7);
                b=II(b,c,d,a,wa[k+5],21,0xFC93A039);
                a=II(a,b,c,d,wa[k+12],6,0x655B59C3);
                d=II(d,a,b,c,wa[k+3],10,0x8F0CCC92);
                c=II(c,d,a,b,wa[k+10],15,0xFFEFF47D);
                b=II(b,c,d,a,wa[k+1],21,0x85845DD1);
                a=II(a,b,c,d,wa[k+8],6,0x6FA87E4F);
                d=II(d,a,b,c,wa[k+15],10,0xFE2CE6E0);
                c=II(c,d,a,b,wa[k+6],15,0xA3014314);
                b=II(b,c,d,a,wa[k+13],21,0x4E0811A1);
                a=II(a,b,c,d,wa[k+4],6,0xF7537E82);
                d=II(d,a,b,c,wa[k+11],10,0xBD3AF235);
                c=II(c,d,a,b,wa[k+2],15,0x2AD7D2BB);
                b=II(b,c,d,a,wa[k+9],21,0xEB86D391);
                a=addUnsigned(a,AA);
                b=addUnsigned(b,BB);
                c=addUnsigned(c,CC);
                d=addUnsigned(d,DD);
            }
            return wordToHex(a)+wordToHex(b)+wordToHex(c)+wordToHex(d);
        }

        // 页面DOM变量
        const sourceTextEl = document.getElementById('sourceText');
        const charCountEl = document.getElementById('charCount');
        const fileInputEl = document.getElementById('fileInput');
        const readAllBtnEl = document.getElementById('readAllBtn');
        const speechRateEl = document.getElementById('speechRate');
        const translateToggleBtnEl = document.getElementById('translateToggleBtn');
        const clearBtnEl = document.getElementById('clearBtn');
        const startBtnEl = document.getElementById('startBtn');
        const resetBtnEl = document.getElementById('resetBtn');
        const inputAreaEl = document.getElementById('inputArea');
        const displayAreaEl = document.getElementById('displayArea');
        const translationAreaEl = document.getElementById('translationArea');
        const translationTextEl = document.getElementById('translationText');
        const toggleTranslationHideBtnEl = document.getElementById('toggleTranslationHideBtn');
        const speedEl = document.getElementById('speed');
        const accuracyEl = document.getElementById('accuracy');
        const timeUsedEl = document.getElementById('timeUsed');
        const progressEl = document.getElementById('progress');
        const modeModal = document.getElementById('modeModal');
        const modalOkBtn = document.getElementById('modalOkBtn');
        const modalCancelBtn = document.getElementById('modalCancelBtn');

        // 快捷链接按钮
        const quickLinkBtns = document.querySelectorAll('.quick-link');

        // 朗读全局状态
        let speechState = {
            sentences: [],
            idx: 0,
            running: false,
            rate: 0.75
        };

        // 打字状态
        let targetFullText = '';
        let targetChars = [];
        let currentPos = 0;
        let startTime = null;
        let timerId = null;
        let totalInput = 0;
        let correctCnt = 0;
        let typingRunning = false;

        function updateCharCount() {
            charCountEl.textContent = sourceTextEl.value.length;
        }
        sourceTextEl.addEventListener('input', updateCharCount);

        // TXT上传
        fileInputEl.addEventListener('change', function(e){
            const f = e.target.files[0];
            if(!f) return;
            const reader = new FileReader();
            reader.onload = evt => {
                sourceTextEl.value = evt.target.result;
                updateCharCount();
            };
            reader.readAsText(f);
        });

        // 快捷链接点击跳转逻辑
        function openUrl(urlStr) {
            let url = urlStr.trim();
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }
            window.open(url, '_blank');
        }
        quickLinkBtns.forEach(btn=>{
            btn.addEventListener('click', ()=>{
                openUrl(btn.dataset.url);
            });
        });

        // 朗读按钮点击直接同步发起语音，绕过HTTPS拦截
        readAllBtnEl.addEventListener('click', function(){
            const txt = sourceTextEl.value.trim();
            if(!txt) return;
            // 停止已有朗读
            clearTimeout(pauseTimer);
            window.speechSynthesis.cancel();
            if(speechState.running){
                speechState.running = false;
                this.classList.remove('btn-speaking');
                this.textContent = '🔊 朗读全文';
                return;
            }
            // 用户点击同步直接创建第一个语音实例，浏览器放行
            speechState.rate = parseFloat(speechRateEl.value);
            speechState.sentences = splitSentences(txt);
            speechState.idx = 0;
            speechState.running = true;
            this.classList.add('btn-speaking');
            this.textContent = '⏹ 停止朗读';

            // 首句直接同步执行，安全校验通过
            const firstSen = speechState.sentences[0];
            const ut = createUtterance(firstSen.text, speechState.rate);
            ut.onend = function(){
                nextSpeak(firstSen.pauseType);
            };
            ut.onerror = function(){
                nextSpeak(firstSen.pauseType);
            };
            window.speechSynthesis.speak(ut);
        });

        // 后续分句延时续播
        function nextSpeak(lastPauseType){
            if(!speechState.running) return;
            speechState.idx++;
            if(speechState.idx >= speechState.sentences.length){
                speechState.running = false;
                readAllBtnEl.classList.remove('btn-speaking');
                readAllBtnEl.textContent = '🔊 朗读全文';
                return;
            }
            const sen = speechState.sentences[speechState.idx];
            if(!sen.text.trim()){
                nextSpeak(sen.pauseType);
                return;
            }
            pauseTimer = setTimeout(()=>{
                const ut = createUtterance(sen.text, speechState.rate);
                ut.onend = ()=>nextSpeak(sen.pauseType);
                ut.onerror = ()=>nextSpeak(sen.pauseType);
                window.speechSynthesis.speak(ut);
            }, PAUSE_CONFIG[lastPauseType]);
        }

        // 语速切换
        speechRateEl.addEventListener('change', function(){
            speechState.rate = parseFloat(this.value);
        });

        // 清空
        clearBtnEl.addEventListener('click', function(){
            sourceTextEl.value = '';
            updateCharCount();
            clearTimeout(pauseTimer);
            window.speechSynthesis.cancel();
            speechState.running = false;
            readAllBtnEl.classList.remove('btn-speaking');
            readAllBtnEl.textContent = '🔊 朗读全文';
        });

        // 隐藏翻译面板
        toggleTranslationHideBtnEl.addEventListener('click', function(){
            translationAreaEl.classList.add('hidden');
        });

        // 翻译切换
        translateToggleBtnEl.addEventListener('click', async function(){
            const txt = sourceTextEl.value.trim();
            if(!txt){
                alert('请先输入练习文本');
                return;
            }
            if(!BAIDU_APPID || !BAIDU_SECRET){
                alert('未配置百度翻译密钥，翻译功能不可用');
                return;
            }
            try{
                const salt = Date.now().toString();
                const sign = md5(BAIDU_APPID + txt + salt + BAIDU_SECRET);
                const url = `https://fanyi-api.baidu.com/api/trans/vip/translate?q=${encodeURIComponent(txt)}&from=en&to=zh&appid=${BAIDU_APPID}&salt=${salt}&sign=${sign}`;
                const res = await fetch(url);
                const data = await res.json();
                if(data.error_code){
                    alert(data.error_msg);
                    return;
                }
                let transResult = '';
                data.trans_result.forEach(item=>{
                    transResult += item.dst + '\n';
                });
                translationTextEl.textContent = transResult;
                translationAreaEl.classList.remove('hidden');
            }catch(err){
                alert('翻译请求失败：' + err.message);
            }
        });

        // 开始练习：检测中文，弹出自定义弹窗
        startBtnEl.addEventListener('click', function(){
            pendingText = sourceTextEl.value.trim();
            if(!pendingText){
                alert('请先填写练习文本');
                return;
            }
            const hasChinese = /[\u4e00-\u9fa5]/.test(pendingText);
            if(hasChinese){
                modeModal.classList.remove('hidden');
                return;
            }
            runTyping(pendingText);
        });

        // 弹窗【确定】按钮
        modalOkBtn.addEventListener('click', function(){
            modeModal.classList.add('hidden');
            runTyping(pendingText);
        });

        // 弹窗【取消】按钮：拆分中英文
        modalCancelBtn.addEventListener('click', function(){
            modeModal.classList.add('hidden');
            const text = pendingText;
            let enLines = [];
            let cnLines = [];
            text.split('\n').forEach(line=>{
                const trimLine = line.trim();
                if(!trimLine) return;
                if(/[\u4e00-\u9fa5]/.test(trimLine)){
                    cnLines.push(trimLine);
                }else{
                    enLines.push(trimLine);
                }
            });
            const enText = enLines.join('\n');
            translationTextEl.textContent = cnLines.join('\n');
            translationAreaEl.classList.remove('hidden');
            runTyping(enText);
        });

        // 真正启动打字逻辑抽成独立函数
        function runTyping(text){
            targetFullText = text;
            targetChars = targetFullText.split('');
            currentPos = 0;
            totalInput = 0;
            correctCnt = 0;
            typingRunning = true;
            startTime = Date.now();
            displayAreaEl.innerHTML = '';
            targetChars.forEach((ch, idx)=>{
                const span = document.createElement('span');
                span.textContent = ch;
                span.className = idx===0 ? 'char-current' : 'char-pending';
                displayAreaEl.appendChild(span);
            });
            inputAreaEl.disabled = false;
            inputAreaEl.value = '';
            inputAreaEl.focus();
            resetBtnEl.disabled = false;
            if(timerId) clearInterval(timerId);
            timerId = setInterval(updateTimerStat, 1000);
        }

        // 计时统计更新
        function updateTimerStat(){
            if(!typingRunning) return;
            const now = Date.now();
            const diffSec = Math.floor((now - startTime)/1000);
            const m = String(Math.floor(diffSec/60)).padStart(2,'0');
            const s = String(diffSec%60).padStart(2,'0');
            timeUsedEl.textContent = `${m}:${s}`;
            if(diffSec <= 0) return;
            const speed = Math.round(correctCnt / diffSec * 60);
            speedEl.textContent = speed;
            const acc = totalInput===0 ? 100 : Math.round(correctCnt / totalInput * 100);
            accuracyEl.textContent = acc + '%';
            const prog = Math.round(currentPos / targetChars.length * 100);
            progressEl.textContent = prog + '%';
            if(currentPos >= targetChars.length){
                typingRunning = false;
                clearInterval(timerId);
                inputAreaEl.disabled = true;
            }
        }

        // 输入框实时比对
        inputAreaEl.addEventListener('input', function(){
            if(!typingRunning) return;
            const inputVal = this.value;
            const inputArr = inputVal.split('');
            totalInput++;
            let newPos = 0;
            correctCnt = 0;
            const spans = displayAreaEl.querySelectorAll('span');
            spans.forEach(sp=>{
                sp.className = 'char-pending';
            });
            for(let i=0;i<inputArr.length;i++){
                if(i >= targetChars.length) break;
                if(inputArr[i] === targetChars[i]){
                    correctCnt++;
                    spans[i].className = 'char-correct';
                }else{
                    spans[i].className = 'char-wrong';
                }
                newPos = i+1;
            }
            currentPos = newPos;
            if(newPos < spans.length){
                spans[newPos].className = 'char-current';
            }
            updateTimerStat();
        });

        // 重新开始
        resetBtnEl.addEventListener('click', function(){
            typingRunning = false;
            clearInterval(timerId);
            startTime = null;
            speedEl.textContent = '0';
            accuracyEl.textContent = '100%';
            timeUsedEl.textContent = '00:00';
            progressEl.textContent = '0%';
            inputAreaEl.value = '';
            inputAreaEl.disabled = true;
            resetBtnEl.disabled = true;
            displayAreaEl.innerHTML = '<span class="text-slate-400">请先在上方设置练习内容，然后点击「开始练习」</span>';
        });

        // 页面卸载停止朗读
        window.addEventListener('beforeunload', ()=>{
            clearTimeout(pauseTimer);
            window.speechSynthesis.cancel();
            speechState.running = false;
            clearInterval(timerId);
        });
    </script>
</body>
</html>
