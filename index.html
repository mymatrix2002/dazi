<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童趣味打字练习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ========== 全局主题变量 日间/暗色切换 ========== */
        :root[data-theme="light"] {
            --bg-page: #f0f9ff;
            --bg-page-pattern: #bfdbfe;
            --bg-card: #ffffff;
            --bg-input: #f0f9ff;
            --bg-gray: #f3f4f6;
            --bg-gray-deep: #f8fafc;
            --text-main: #1e293b;
            --text-sub: #475569;
            --text-light: #64748b;
            --text-placeholder: #94a3b8;
            --border-normal: #e2e8f0;
            --border-focus: #3b82f6;
            --shadow-card: 0 4px 12px rgba(59, 130, 246, 0.12);
            --shadow-modal: 0 8px 30px rgba(0,0,0,0.18);
            --color-correct: #059669;
            --color-wrong: #dc2626;
            --color-primary: #3b82f6;
            --color-primary-dark: #2563eb;
            --color-success: #10b981;
            --color-success-dark: #059669;
            --color-warning: #f97316;
            --color-warning-dark: #ea580c;
            --scrollbar-bg: #f1f5f9;
            --scrollbar-thumb: #cbd5e1;
        }

        :root[data-theme="dark"] {
            /* 暗色护眼长时间观看配色，低蓝光、柔和灰度 */
            --bg-page: #0f172a;
            --bg-page-pattern: #1e293b;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --bg-gray: #334155;
            --bg-gray-deep: #273449;
            --text-main: #e2e8f0;
            --text-sub: #cbd5e1;
            --text-light: #94a3b8;
            --text-placeholder: #64748b;
            --border-normal: #334155;
            --border-focus: #60a5fa;
            --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.35);
            --shadow-modal: 0 8px 30px rgba(0,0,0,0.55);
            --color-correct: #34d399;
            --color-wrong: #f87171;
            --color-primary: #3b82f6;
            --color-primary-dark: #60a5fa;
            --color-success: #10b981;
            --color-success-dark: #34d399;
            --color-warning: #fb923c;
            --color-warning-dark: #fdba74;
            --scrollbar-bg: #1e293b;
            --scrollbar-thumb: #475569;
        }

        /* 全局样式绑定主题变量 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        @keyframes blink {
            0%, 50% { border-color: var(--border-focus); }
            51%, 100% { border-color: transparent; }
        }
        @keyframes comboUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.2); }
        }
        @keyframes fadeInOut {
            0% { opacity: 0; bottom: 20px; }
            15% { opacity: 1; bottom: 30px; }
            85% { opacity: 1; bottom: 30px; }
            100% { opacity: 0; bottom: 20px; }
        }

        /* 练习完成弹窗样式 */
        .modal-mask-finish {
            position: fixed;
            inset: 0;
            background-color: rgba(0,0,0,0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }
        .modal-card-finish {
            width: min(90%, 440px);
            background: var(--bg-card);
            border-radius: 20px;
            padding: 32px 28px;
            box-shadow: var(--shadow-modal);
        }
        .finish-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            color: var(--text-main);
            margin-bottom: 16px;
        }
        .finish-desc {
            text-align: center;
            font-size: 15px;
            color: var(--text-light);
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 12px;
            background-color: var(--bg-gray-deep);
            margin-bottom: 10px;
            font-size: 15px;
        }
        .data-label {
            color: var(--text-sub);
        }
        .data-value {
            font-weight: 600;
            color: var(--color-primary-dark);
        }
        .data-value.good {
            color: var(--color-success-dark);
        }
        .btn-wrap {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }
        .btn-finish {
            flex: 1;
            padding: 12px 0;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary-finish {
            background-color: var(--color-primary);
            color: white;
        }
        .btn-primary-finish:hover {
            background-color: var(--color-primary-dark);
        }
        .btn-secondary-finish {
            background-color: var(--bg-gray);
            color: var(--text-main);
        }
        .btn-secondary-finish:hover {
            filter: brightness(1.15);
        }

        .char-correct {
            color: var(--color-correct);
            animation: bounce 0.3s ease;
            font-weight: 600;
        }
        。char-wrong {
            color: var(--color-wrong);
            background-color: rgba(248, 113, 113, 0.15);
            border-radius: 4px;
        }
        .char-current {
            border-bottom: 3px solid var(--border-focus);
            animation: blink 1s infinite;
        }
        .char-pending {
            color: var(--text-light);
        }
        .char-done {
            opacity: 0.7;
        }
        .sentence-read-highlight {
            background-color: rgba(96, 165, 250, 0.18);
            border-radius: 4px;
        }

        body {
            background-color: var(--bg-page);
            background-image: radial-gradient(var(--bg-page-pattern) 6%, transparent 6%);
            background-size: 30px 30px;
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .card-round {
            border-radius: 16px !important;
            box-shadow: var(--shadow-card);
            background-color: var(--bg-card);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: var(--color-primary-dark);
            transform: translateY(-2px);
        }
        .btn-success {
            background-color: var(--color-success);
            color: white;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .btn-success:hover {
            background-color: var(--color-success-dark);
            transform: translateY(-2px);
        }
        .btn-warning {
            background-color: var(--color-warning);
            color: white;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .btn-warning:hover {
            background-color: var(--color-warning-dark);
            transform: translateY(-2px);
        }
        .btn-normal {
            background-color: var(--bg-gray);
            color: var(--text-main);
            border-radius: 12px;
            transition: background-color 0.2s;
        }
        .btn-normal:hover {
            filter: brightness(1.15);
        }

        /* 双语对照区基础样式 */
        .paragraph-container {
            width: 100%;
            column-gap: 1rem;
            row-gap: 0.8rem;
            align-items: start;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 8px;
            display: grid;
        }
        /* 双语双栏模式 */
        .paragraph-container.two-col {
            grid-template-columns: 42% 58%;
        }
        /* 全文单栏全屏模式 */
        .paragraph-container.one-col {
            grid-template-columns: 100%;
        }
        .paragraph-container::-webkit-scrollbar {
            width: 6px;
        }
        .paragraph-container::-webkit-scrollbar-thumb {
            background-color: var(--scrollbar-thumb);
            border-radius: 3px;
        }
        .paragraph-container::-webkit-scrollbar-track {
            background: var(--scrollbar-bg);
        }
        .paragraph-cn {
            width: 100%;
            line-height: 1.8;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 1.25rem;
            color: var(--text-sub);
            white-space: pre-wrap;
            overflow-wrap: break-word;
            word-break: normal;
            background-color: var(--bg-gray-deep);
            border-radius: 0.5rem;
            padding: 0.75rem;
            box-sizing: border-box;
        }
        .paragraph-en {
            width: 100%;
            min-width: 0;
            line-height: 1.8;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 1.125rem;
            color: var(--text-main);
            white-space: pre-wrap;
            overflow-wrap: break-word;
            word-break: normal;
            text-align: left;
            box-sizing: border-box;
        }
        /* 全文模式下的通用行样式（中英通用） */
        .paragraph-full {
            width: 100%;
            line-height: 1.8;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 1.25rem;
            color: var(--text-main);
            white-space: pre-wrap;
            overflow-wrap: break-word;
            word-break: normal;
            text-align: left;
            box-sizing: border-box;
        }

        #displayArea {
            min-height: 120px;
            overflow-y: auto;
            margin-top: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .header-title h1 {
            margin: 0;
            color: var(--text-main);
        }
        .version-info {
            color: var(--text-light);
            font-size: 14px;
            font-weight: normal;
            user-select: none;
        }

        .btn-speaking {
            background-color: var(--color-primary) !important;
            color: white !important;
        }

        #speechRate {
            background-color: var(--bg-gray);
            border: none;
            outline: none;
            border-radius: 12px;
            padding: 6px 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
            color: var(--text-main);
        }
        #speechRate:hover {
            filter: brightness(1.15);
        }

        .modal-mask {
            position: fixed;
            inset: 0;
            background-color: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-box {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 32px;
            max-width: 520px;
            width: 90%;
            box-shadow: var(--shadow-modal);
        }
        .modal-box h3 {
            color: var(--text-main);
        }
        .modal-box p {
            color: var(--text-sub);
        }
        .modal-buttons {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            margin-top: 28px;
        }

        .float-star {
            position: absolute;
            font-size: 26px;
            pointer-events: none;
            z-index: 99999;
            transition: all 1s ease-out;
        }
        .combo-tip {
            position: fixed;
            font-size: 20px;
            font-weight: bold;
            color: var(--color-primary-dark);
            background: rgba(96, 165, 250, 0.18);
            padding: 6px 14px;
            border-radius: 999px;
            z-index: 99999;
            pointer-events: none;
            animation: comboUp 1.2s ease-out forwards;
        }
        .error-hint {
            position: fixed;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            background: rgba(251, 146, 60, 0.18);
            color: var(--color-warning-dark);
            padding: 8px 16px;
            border-radius: 12px;
            z-index: 99999;
            animation: fadeInOut 3s forwards;
        }
        .sticker-box {
            position: fixed;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--bg-card);
            padding: 10px 6px;
            border-radius: 12px;
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 99;
        }
        .sticker-item {
            width: 36px;
            height: 36px;
            display: grid;
            place-items: center;
            font-size: 22px;
            opacity: 0.25;
            border: 1px dashed var(--border-normal);
            border-radius: 8px;
        }
        .sticker-item.unlock {
            opacity: 1;
            border: none;
            background: rgba(254, 249, 195, 0.15);
        }

        .progress-wrap {
            width: 100%;
            height: 12px;
            background: var(--bg-gray);
            border-radius: 999px;
            overflow: hidden;
            margin-top: 4px;
        }
        .progress-bar {
            height: 100%;
            border-radius: 999px;
            transition: width 0.3s ease;
        }

        .translation-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }
        .translation-title {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-light);
        }
        .toggle-btn {
            font-size: 12px;
            color: var(--color-primary-dark);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        /* 输入框通用样式 */
        textarea {
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border-normal);
        }
        textarea:focus {
            outline: none;
            border-color: var(--border-focus);
        }
        textarea::placeholder {
            color: var(--text-placeholder);
        }
        /* 主题切换按钮 */
        #themeToggle {
            padding: 6px 12px;
        }
    </style>
</head>
<body class="min-h-screen p-4 max-w-5xl mx-auto">
    <div id="modeModal" class="modal-mask hidden">
        <div class="modal-box">
            <h3 class="text-xl font-semibold mb-4">检测到文本包含中文，请选择练习模式</h3>
            <p class="text-slate-600 mb-2">「确定」：全文练习模式（单栏全屏，完整保留中英内容，全文打字）</p>
            <p class="text-slate-600">「取消」：双语对照模式（左右分栏，中文对照，仅练习英文）</p>
            <div class="modal-buttons">
                <button id="modalOkBtn" class="btn-primary px-5 py-2">确定</button>
                <button id="modalCancelBtn" class="btn-normal px-5 py-2">取消</button>
            </div>
        </div>
    </div>

    <div class="header-title">
        <h1 class="text-3xl font-bold">⌨️儿童趣味打字练习</h1>
        <span class="version-info">v2.0.1</span>
        <!-- 日间/暗色切换按钮 -->
        <button id="themeToggle" class="btn-normal text-sm">切换日间模式</button>
    </div>

    <div class="card-round p-4 mb-6 flex flex-wrap gap-3 items-center">
        <span class="font-medium">快捷链接：</span>
        <div class="flex flex-wrap gap-2">
            <button data-url="https://fanyi.baidu.com" class="quick-link btn-normal px-3 py-1.5 text-sm">百度翻译</button>
            <button data-url="https://fanyi.youdao.com" class="quick-link btn-normal px-3 py-1.5 text-sm">有道翻译</button>
            <button data-url="https://mp.weixin.qq.com/s/etqCO_DlCOP0KaBUfz2wXw" class="quick-link btn-normal px-3 py-1.5 text-sm">广州1-6年级英语教材</button>
        </div>
    </div>

    <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="card-round p-4 text-center">
            <div class="text-2xl font-bold text-blue-600" id="speed">0</div>
            <div class="text-xs mt-1">打字速度(字/分钟)</div>
            <div class="progress-wrap mt-2">
                <div id="speedBar" class="progress-bar bg-blue-500" style="width: 0%"></div>
            </div>
        </div>
        <div class="card-round p-4 text-center">
            <div class="text-2xl font-bold text-green-600" id="accuracy">0%</div>
            <div class="text-xs mt-1">准确率</div>
            <div class="progress-wrap mt-2">
                <div id="accBar" class="progress-bar bg-green-500" style="width: 0%"></div>
            </div>
        </div>
        <div class="card-round p-4 text-center">
            <div class="text-2xl font-bold text-amber-600" id="timeUsed">00:00</div>
            <div class="text-xs mt-1">用时</div>
        </div>
        <div class="card-round p-4 text-center">
            <div class="text-2xl font-bold text-purple-600" id="progress">0%</div>
            <div class="text-xs mt-1">全文进度</div>
            <div class="progress-wrap mt-2">
                <div id="progBar" class="progress-bar bg-purple-500" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div class="card-round p-5 mb-6">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
            <h2 class="font-semibold">练习内容设置</h2>
            <div class="flex flex-wrap gap-2 items-center">
                <label class="btn-normal px-3 py-1.5 text-sm cursor-pointer">
                    📁 上传TXT文件
                    <input type="file" id="fileInput" accept=".txt" class="hidden">
                </label>
                <button id="readAllBtn" class="btn-success px-3 py-1.5 text-sm">🔊 朗读全文</button>
                <select id="speechRate">
                    <option value="0.25">0.25x</option>
                    <option value="0.5">0.5x</option>
                    <option value="0.75" selected>0.75x</option>
                    <option value="1.0">1.0x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                </select>
                <button id="wordSpeakToggle" class="btn-normal px-3 py-1.5 text-sm">单词朗读：已开启</button>
                <button id="clearBtn" class="btn-warning px-3 py-1.5 text-sm">清空</button>
            </div>
        </div>
        <textarea id="sourceText" class="w-full h-28 p-3 border rounded-xl text-sm resize-none" placeholder="粘贴练习内容，或上传TXT文件，自带音标[xxx]会自动删除"></textarea>
        <div class="flex justify-between items-center mt-3">
            <span class="text-xs text-slate-400">字符数：<span id="charCount">0</span></span>
            <button id="startBtn" class="btn-primary px-5 py-2 text-sm font-medium">开始练习</button>
        </div>
    </div>

    <div class="card-round p-6 mb-4">
        <div id="bilingualArea" class="hidden">
            <div class="translation-header">
                <span class="translation-title" id="areaTitle">中文对照</span>
                <button id="toggleTranslationBtn" class="toggle-btn">收起</button>
            </div>
            <div id="paragraphContainer" class="paragraph-container"></div>
        </div>

        <div id="displayArea" class="en-text select-none" style="letter-spacing:0.5px;">
            <span class="text-slate-400">✨ 请先粘贴练习内容，点击「开始练习」✨</span>
        </div>

        <textarea id="inputArea" wrap="off" class="w-full p-3 border-2 rounded-xl font-mono text-lg resize-none mt-4" rows="3" placeholder="在这里打字..." disabled></textarea>
    </div>

    <div class="flex justify-center gap-3 mb-6">
        <button id="resetBtn" class="btn-warning px-5 py-2 text-sm" disabled>重新开始</button>
    </div>

    <div class="sticker-box">
        <div class="sticker-item" data-id="0">🐱</div>
        <div class="sticker-item" data-id="1">🐶</div>
        <div class="sticker-item" data-id="2">🚀</div>
        <div class="sticker-item" data-id="3">📖</div>
    </div>

<script>
// ========== 日间/暗色主题切换核心逻辑（持久化存储） ==========
const htmlRoot = document.documentElement;
const themeToggleBtn = document.getElementById('themeToggle');
// 读取本地存储主题，无则默认暗色dark
let currentTheme = localStorage.getItem('pageTheme') || 'dark';
htmlRoot.setAttribute('data-theme', currentTheme);
updateThemeButtonText();

// 切换按钮点击事件
themeToggleBtn.addEventListener('click', () => {
    currentTheme = currentTheme === 'light' ? 'dark' : 'light';
    htmlRoot.setAttribute('data-theme', currentTheme);
    localStorage.setItem('pageTheme', currentTheme);
    updateThemeButtonText();
});

// 更新按钮文字
function updateThemeButtonText() {
    if(currentTheme === 'light') {
        themeToggleBtn.textContent = '切换暗色模式';
    } else {
        themeToggleBtn.textContent = '切换日间模式';
    }
}

// ========== 单词空格朗读配置 持久化存储 ==========
const wordSpeakToggleBtn = document.getElementById('wordSpeakToggle');
// 本地存储，默认开启
let wordSpeakEnable = localStorage.getItem('wordSpeakEnable') ?? 'true';
updateWordSpeakBtnText();

// 切换开关点击事件
wordSpeakToggleBtn.addEventListener('click', () => {
    wordSpeakEnable = wordSpeakEnable === 'true' ? 'false' : 'true';
    localStorage.setItem('wordSpeakEnable', wordSpeakEnable);
    updateWordSpeakBtnText();
});

// 更新按钮文字
function updateWordSpeakBtnText() {
    if(wordSpeakEnable === 'true') {
        wordSpeakToggleBtn.textContent = '单词朗读：已开启';
        wordSpeakToggleBtn.classList.add('btn-success');
    } else {
        wordSpeakToggleBtn.textContent = '单词朗读：已关闭';
        wordSpeakToggleBtn.classList.remove('btn-success');
    }
}

// ===================== 下方粘贴第二部分JS业务代码 =====================
const PAUSE_CONFIG = { period:700, mark:400, newline:150 };
let pauseTimer = null;
let pendingText = '';
// 单词朗读临时缓存
let lastWordText = '';
// 修复：记录上一次输入内容，用于检测空格输入
let prevInputValue = '';

let currentEntryIndex = 0;
let entryCharsList = [];
let finishedWordSet = new Set();
let isFullTextMode = false; // 标记是否为全文练习模式

// ========== 统一文本预处理函数 ==========
// 核心规则：连续3个及以上空格/制表符 → 替换为单个换行符，适配多空格分隔的单词表
function preprocessText(text) {
    // 匹配连续3个及以上的半角空格或制表符，替换为单个换行
    let processed = text.replace(/[ \t]{3,}/g, '\n');
    return processed;
}

// ========== 核心文本解析引擎 ==========
// 移除音标括号内容
function removePhoneticSymbols(str) {
    return str.replace(/\[.*?\]/g, '');
}

// 判断字符串是否仅含数字/标点/空格，无英文字母
function hasNoEnglishLetter(s) {
    return !/[a-zA-Z]/.test(s);
}

// 判断一行是否为中文主导（中文占比超20%即判定为中文行）
function isChineseDominant(line) {
    const cnCount = (line.match(/[\u4e00-\u9fa5]/g) || []).length;
    const total = line.trim().length;
    return total > 0 && cnCount / total > 0.2;
}

// 提取全文内容：统一弯引号为直引号，完整保留中英文字、标点、空格
function extractFullText(str) {
    let clean = removePhoneticSymbols(str).trim();
    // 引号归一化：所有智能弯引号统一转为英文半角直引号
    clean = clean.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'");
    return clean;
}

// 提取纯英文内容：统一弯引号为直引号，白名单保留半角标点
function extractEnglishText(str) {
    let clean = removePhoneticSymbols(str);
    // 引号归一化：所有智能弯引号统一转为英文半角直引号
    clean = clean.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'");
    // 白名单：半角标点 + 字母数字空格
    clean = clean.replace(/[^"'a-zA-Z0-9\s\.,!?;:\-()\/]/g, '');
    // 合并多余空格
    clean = clean.replace(/\s+/g, ' ').trim();
    return clean;
}

// 提取中文释义：中文主导行直接保留全部文本（仅去音标），完整保留半角/全角标点
function extractChineseText(str) {
    return removePhoneticSymbols(str).trim();
}

// 判断是否包含中文
function hasChinese(str) {
    return /[\u4e00-\u9fa5]/.test(str);
}

// 清理多余空行
function cleanMultiBlankLines(text) {
    return text.replace(/\n\s*\n\s*\n/g, '\n\n').trim();
}

// ========== 全文模式：按行拆分完整文本，去掉空行 ==========
function parseFullTextLines(text) {
    // 先执行预处理：多空格转换行
    const processed = preprocessText(text);
    const fullText = extractFullText(processed);
    const lines = fullText.split('\n').map(l => l.trim()).filter(l => l);
    return lines;
}

// ========== 智能双语配对：主语言判定 + 双格式兼容 ==========
function parseBilingualPairs(text) {
    // 先执行预处理：多空格转换行
    const processed = preprocessText(text);
    const cleanText = cleanMultiBlankLines(processed);
    const lines = cleanText.split('\n');
    const lineInfos = [];

    // 第一步：逐行判定主语言
    for (let line of lines) {
        line = line.trim();
        if (!line) continue;
        
        if (isChineseDominant(line)) {
            // 中文主导行：整行作为中文释义，不提取英文
            lineInfos.push({
                type: 'cn',
                cn: extractChineseText(line),
                en: ''
            });
        } else {
            // 英文主导行：提取纯英文
            const en = extractEnglishText(line);
            // 过滤无英文字母的无效行（纯标点/纯数字）
            if (en && !hasNoEnglishLetter(en)) {
                lineInfos.push({
                    type: 'en',
                    en: en,
                    cn: ''
                });
            }
        }
    }

    // 第二步：配对逻辑
    const pairs = [];
    let i = 0;
    while (i < lineInfos.length) {
        const curr = lineInfos[i];

        // 场景1：当前是英文行，下一行是中文行 → 配对
        if (curr.type === 'en' && i + 1 < lineInfos.length && lineInfos[i+1].type === 'cn') {
            pairs.push({ en: curr.en, cn: lineInfos[i+1].cn });
            i += 2;
            continue;
        }

        // 场景2：当前是英文行，下一行不是中文行 → 单独英文，中文为空
        if (curr.type === 'en') {
            pairs.push({ en: curr.en, cn: '' });
            i++;
            continue;
        }

        // 场景3：单独的中文行（无对应英文）→ 跳过
        i++;
    }

    // 额外兼容：同行中英单词表格式（一行内同时有英文+中文，且英文在前）
    if (pairs.length === 0) {
        const rawLines = cleanText.split('\n').map(l=>l.trim()).filter(l=>l);
        for (let line of rawLines) {
            const en = extractEnglishText(line);
            const cn = extractChineseText(line);
            if (en && !hasNoEnglishLetter(en) && cn) {
                pairs.push({ en, cn });
            }
        }
    }

    return pairs;
}

let comboCount = 0;

function numberToEnglish(num) {
    const ones = ["zero","one","two","three","four","five","six","seven","eight","nine","ten","eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen"];
    const tens = ["","","twenty","thirty","forty","fifty","sixty","seventy","eighty","ninety"];
    if(num<20) return ones[num];
    if(num<100){
        const t=Math.floor(num/10), o=num%10;
        return o>0 ? `${tens[t]}-${ones[o]}` : tens[t];
    }
    const h=Math.floor(num/100), rem=num%100;
    let res=ones[h]+" hundred";
    if(rem>0) res+=" "+numberToEnglish(rem);
    return res;
}
function replaceDigitsToEnglish(s){
    return s.replace(/\d+/g,m=>numberToEnglish(+m));
}
function fixArticleRead(s){
    return s.replace(/\b a \b([bcdfghjklmnpqrstvwBCDFGHJKLMNPQRSTVW])/g," uh $1")
            .replace(/^\ba\s+([bcdfghjklmnpqrstvwBCDFGHJKLMNPQRSTVW])/gm,"uh $1");
}

function splitSentences(text){
    const map=new Map();
    let idx=0;
    text=text.replace(/\w+'(ll|re|s|t|ve|d)/g,m=>{
        const k=`__TMP${idx}__`; map.set(k,m); idx++; return k;
    });
    const reg=/[^.!?\n]+[.!?]+(?=\s|$|\n)|[^.!?\n]+\n|.+$/g;
    let match, arr=[];
    while((match=reg.exec(text))!==null){
        let seg=match[0];
        for(let [k,v] of map) seg=seg.replace(k,v);
        let ptype="newline";
        const last=seg.trimEnd().slice(-1);
        if(last===".") ptype="period";
        else if(last==="!"||last==="?") ptype="mark";
        arr.push({text:seg, pauseType:ptype});
    }
    if(arr.length===0 && text.trim()) arr.push({text, pauseType:"newline"});
    return arr;
}

function createUtterance(rawTxt, rate){
    const ut=new SpeechSynthesisUtterance();
    ut.rate=rate; ut.pitch=1;
    const isCN=hasChinese(rawTxt);
    if(isCN){
        ut.lang="zh-CN"; ut.text=rawTxt;
    }else{
        ut.lang="en-US";
        let t=replaceDigitsToEnglish(rawTxt);
        t=fixArticleRead(t);
        ut.text=t;
    }
    return ut;
}

function openUrl(u){
    let url=u.trim();
    if(!/^https?:\/\//i.test(url)) url='https://'+url;
    window.open(url,'_blank');
}
quickLinkBtns.forEach(btn=>btn.addEventListener('click',()=>openUrl(btn.dataset.url)));

function createStar(x,y){
    const star=document.createElement('div');
    star.className="float-star";
    star.textContent="⭐";
    star.style.left=x+"px";
    star.style.top=y+"px";
    document.body.appendChild(star);
    setTimeout(()=>{
        star.style.opacity="0";
        star.style.transform="translateY(-90px) scale(1.4)";
    },10);
    setTimeout(()=>star.remove(),1000);
}
function batchStar(x,y,num) {
    for(let i=0;i<num;i++){
        setTimeout(()=>createStar(x+(i-2)*18,y-10),i*80);
    }
}
function showComboTip(text, x, y) {
    const tip = document.createElement('div');
    tip.className = 'combo-tip';
    tip.textContent = text;
    tip.style.left = x + 'px';
    tip.style.top = y + 'px';
    document.body.appendChild(tip);
    setTimeout(()=>tip.remove(),1200);
}
function showErrorHint(text) {
    const hint = document.createElement('div');
    hint.className = 'error-hint';
    hint.textContent = text;
    document.body.appendChild(hint);
    setTimeout(()=>hint.remove(),3000);
}
function unlockSticker(idx) {
    if(stickerUnlock[idx]) return;
    stickerUnlock[idx] = true;
    document.querySelector(`.sticker-item[data-id="${idx}"]`).classList.add('unlock');
}
// 回收当前最大序号已解锁贴纸（书本3号不回收）
function revokeLastSticker() {
    let lastIdx = -1;
    for(let i=2;i>=0;i--){
        if(stickerUnlock[i]){
            lastIdx = i;
            break;
        }
    }
    if(lastIdx === -1) return;
    stickerUnlock[lastIdx] = false;
    document.querySelector(`.sticker-item[data-id="${lastIdx}"]`).classList.remove('unlock');
}

readAllBtnEl.addEventListener('click',function(){
    let txt = targetFullText.trim();
    if(!txt){
        alert('展示区暂无文字，请先点击【开始练习】');
        return;
    }
    clearTimeout(pauseTimer);
    speechSynthesis.cancel();
    if(speechState.running){
        speechState.running=false;
        this.classList.remove('btn-speaking');
        this.textContent='🔊 朗读全文';
        return;
    }
    speechState.rate=+speechRateEl.value;
    speechState.sentences=splitSentences(txt);
    speechState.idx=0;
    speechState.running=true;
    this.classList.add('btn-speaking');
    this.textContent='⏹ 停止朗读';
    const first=speechState.sentences[0];
    const ut=createUtterance(first.text,speechState.rate);
    ut.onend=()=>nextSpeak(first.pauseType);
    ut.onerror=()=>nextSpeak(first.pauseType);
    speechSynthesis.speak(ut);
});

function nextSpeak(lastPause){
    if(!speechState.running) return;
    document.querySelectorAll('.sentence-read-highlight').forEach(el=>{
        el.classList.remove('sentence-read-highlight');
    });
    speechState.idx++;
    if(speechState.idx>=speechState.sentences.length){
        speechState.running=false;
        readAllBtnEl.classList.remove('btn-speaking');
        readAllBtnEl.textContent='🔊 朗读全文';
        return;
    }
    const sen=speechState.sentences[speechState.idx];
    if(!sen.text.trim()){ nextSpeak(sen.pauseType); return; }

    let charOffset = 0;
    const allSent = speechState.sentences.slice(0,speechState.idx);
    allSent.forEach(s=>charOffset += s.text.length);
    const endOffset = charOffset + sen.text.length;

    if (isBilingualMode) {
        const allEnSpans = paragraphContainerEl.querySelectorAll('.paragraph-full span, .paragraph-en span');
        for(let i=charOffset;i<endOffset && i<allEnSpans.length;i++){
            allEnSpans[i].classList.add('sentence-read-highlight');
        }
    } else {
        const spans = displayAreaEl.querySelectorAll('span');
        for(let i=charOffset;i<endOffset && i<spans.length;i++){
            spans[i].classList.add('sentence-read-highlight');
        }
    }

    pauseTimer=setTimeout(()=>{
        const ut=createUtterance(sen.text,speechState.rate);
        ut.onend=()=>nextSpeak(sen.pauseType);
        ut.onerror=()=>nextSpeak(sen.pauseType);
        speechSynthesis.speak(ut);
    },PAUSE_CONFIG[lastPause]);
}

// ========== 全文练习模式：单栏全屏，完整保留中英内容 ==========
function runTypingFullMode(text){
    isFullTextMode = true;
    isBilingualMode = true;
    displayAreaEl.innerHTML = '';
    displayAreaEl.classList.add('hidden');
    displayAreaEl.style.display = 'none';
    bilingualAreaEl.classList.remove('hidden');
    areaTitleEl.textContent = '全文练习';
    toggleTranslationBtnEl.classList.add('hidden'); // 全文模式隐藏收起按钮
    // 切换单栏样式
    paragraphContainerEl.className = 'paragraph-container one-col';

    const fullLines = parseFullTextLines(text);
    paragraphContainerEl.innerHTML = '';
    entryCharsList = [];
    currentEntryIndex = 0;
    finishedWordSet.clear();
    // 重置输入缓存
    prevInputValue = '';

    fullLines.forEach((lineText, idx) => {
        const lineCol = document.createElement('div');
        lineCol.className = 'paragraph-full';
        lineCol.dataset.segmentIndex = idx;

        entryCharsList.push(lineText.split(''));

        const chars = lineText.split('');
        chars.forEach((ch, chIdx) => {
            const span = document.createElement('span');
            span.textContent = ch;
            span.className = (idx === currentEntryIndex && chIdx === 0) ? 'char-current' : 'char-pending';
            lineCol.appendChild(span);
        });

        paragraphContainerEl.appendChild(lineCol);
    });

    targetFullText = fullLines.join(' ').trim();
    targetChars = targetFullText.split('');
    currentPos=0; totalInput=0; correctCnt=0; typingRunning=true;
    comboCount=0; wrongContinuous=0;
    startTime=Date.now();
    if(timerId) clearInterval(timerId);

    inputAreaEl.disabled=false; 
    inputAreaEl.value=''; 
    inputAreaEl.focus();
    resetBtnEl.disabled=false;
    timerId=setInterval(updateStat,1000);
    accuracyEl.textContent = "100%";
    accBar.style.width = "100%";
    updateStat();
    paragraphContainerEl.scrollTop = 0;
}

// ========== 双语对照模式：左右双栏中英配对 ==========
function runTypingBilingualMode(text){
    isFullTextMode = false;
    isBilingualMode = true;
    displayAreaEl.innerHTML = '';
    displayAreaEl.classList.add('hidden');
    displayAreaEl.style.display = 'none';
    bilingualAreaEl.classList.remove('hidden');
    areaTitleEl.textContent = '中文对照';
    toggleTranslationBtnEl.classList.remove('hidden');
    toggleTranslationBtnEl.textContent = '收起';
    // 切换双栏样式
    paragraphContainerEl.className = 'paragraph-container two-col';

    const pairs = parseBilingualPairs(text);
    paragraphContainerEl.innerHTML = '';
    entryCharsList = [];
    currentEntryIndex = 0;
    finishedWordSet.clear();
    // 重置输入缓存
    prevInputValue = '';

    pairs.forEach((pair, idx) => {
        const cnCol = document.createElement('div');
        cnCol.className = 'paragraph-cn';
        cnCol.textContent = pair.cn || '';

        const enCol = document.createElement('div');
        enCol.className = 'paragraph-en';
        enCol.dataset.segmentIndex = idx;

        entryCharsList.push(pair.en.split(''));

        const chars = pair.en.split('');
        chars.forEach((ch, chIdx) => {
            const span = document.createElement('span');
            span.textContent = ch;
            span.className = (idx === currentEntryIndex && chIdx === 0) ? 'char-current' : 'char-pending';
            enCol.appendChild(span);
        });

        paragraphContainerEl.appendChild(cnCol);
        paragraphContainerEl.appendChild(enCol);
    });

    targetFullText = pairs.map(p=>p.en).join(' ').trim();
    targetChars = targetFullText.split('');
    currentPos=0; totalInput=0; correctCnt=0; typingRunning=true;
    comboCount=0; wrongContinuous=0;
    startTime=Date.now();
    if(timerId) clearInterval(timerId);

    inputAreaEl.disabled=false; 
    inputAreaEl.value=''; 
    inputAreaEl.focus();
    resetBtnEl.disabled=false;
    timerId=setInterval(updateStat,1000);
    accuracyEl.textContent = "100%";
    accBar.style.width = "100%";
    updateStat();
    paragraphContainerEl.scrollTop = 0;
}

function updateStat(){
    if(!typingRunning) return;
    const now=Date.now();
    const sec=Math.floor((now-startTime)/1000);
    const m=String(Math.floor(sec/60)).padStart(2,'0');
    const s=String(sec%60).padStart(2,'0');
    timeUsedEl.textContent=`${m}:${s}`;

    // 速度计算分母保护
    let speed = 0;
    if(sec > 0){
        speed = Math.round((correctCnt/5) / (sec/60));
    }
    speedEl.textContent=speed;
    speedBar.style.width=Math.min(speed/300*100,100)+"%";

    let acc = 100;
    if (totalInput > 0) {
        acc = Math.round((correctCnt / totalInput) * 100);
        if(acc > 100) acc = 100;
    }
    accuracyEl.textContent = acc + "%";
    accBar.style.width = acc + "%";

    // 进度计算分母保护，解决NaN
    let prog = 0;
    if(targetChars.length > 0){
        prog = Math.round(currentPos / targetChars.length * 100);
    }
    progressEl.textContent=prog+"%";
    progBar.style.width=prog+"%";

    if(targetChars.length > 0 && currentPos >= targetChars.length){
        typingRunning=false; clearInterval(timerId);
        inputAreaEl.disabled=true;
        showFinishModal();
    }
}

// 练习完成弹窗
function showFinishModal(){
    unlockSticker(3);

    const totalSec = Math.floor((Date.now() - startTime) / 1000);
    const min = String(Math.floor(totalSec / 60)).padStart(2, '0');
    const sec = String(totalSec % 60).padStart(2, '0');
    const timeStr = `${min}:${sec}`;

    let finalAcc = 100;
    if (totalInput > 0) {
        finalAcc = Math.round((correctCnt / totalInput) * 100);
        if(finalAcc > 100) finalAcc = 100;
    }
    const wordCount = finishedWordSet.size;

    let tipText = '';
    if(finalAcc === 100){
        tipText = '太棒啦！全部正确，打字基本功非常扎实🎉';
    }else if(finalAcc >= 80){
        tipText = '表现不错！少量失误，多加练习就能满分✨';
    }else if(finalAcc >= 60){
        tipText = '刚好及格，注意区分易混淆字母，放慢速度减少错误';
    }else{
        tipText = '正确率偏低，建议放慢输入速度，看清单词再敲击';
    }

    const mask = document.createElement('div');
    mask.className = 'modal-mask-finish';
    mask.id = 'finishMask';
    mask.innerHTML = `
        <div class="modal-card-finish">
            <h2 class="finish-title">🎉 练习全部完成</h2>
            <p class="finish-desc">${tipText}</p>
            <div class="data-row">
                <span class="data-label">总用时</span>
                <span class="data-value">${timeStr}</span>
            </div>
            <div class="data-row">
                <span class="data-label">完成单词行数</span>
                <span class="data-value">${wordCount} 行</span>
            </div>
            <div class="data-row">
                <span class="data-label">总输入字符</span>
                <span class="data-value">${totalInput}</span>
            </div>
            <div class="data-row">
                <span class="data-label">正确字符</span>
                <span class="data-value good">${correctCnt}</span>
            </div>
            <div class="data-row">
                <span class="data-label">最终正确率</span>
                <span class="data-value good">${finalAcc}%</span>
            </div>
            <div class="btn-wrap">
                <button class="btn-finish btn-secondary-finish" id="modalClear">清空文本</button>
                <button class="btn-finish btn-primary-finish" id="modalRestart">重新练习</button>
            </div>
        </div>
    `;
    document.body.appendChild(mask);

    mask.addEventListener('click', e=>{
        if(e.target === mask) mask.remove();
    });
    document.getElementById('modalRestart').onclick = ()=>{
        mask.remove();
        resetBtnEl.click();
    };
    document.getElementById('modalClear').onclick = ()=>{
        mask.remove();
        clearBtnEl.click();
    };
}

// ========== 输入框事件：禁止粘贴 + 空格朗读单词 + 打字校验 ==========
// 拦截粘贴，禁止输入框粘贴内容
inputAreaEl.addEventListener('paste', function(e) {
    e.preventDefault();
});

// 输入核心逻辑（修复版：内容对比检测空格，全浏览器兼容）
inputAreaEl.addEventListener('input',function(e){
    if(!typingRunning) return;
    const val = this.value;
    const activeChars = entryCharsList[currentEntryIndex];
    const entryLen = activeChars.length;

    // ===== 修复：空格触发单词朗读（内容对比法，兼容所有输入法） =====
    // 检测本次输入是否新增了空格
    const valLen = val.length;
    const prevLen = prevInputValue.length;
    if(wordSpeakEnable === 'true' && valLen > prevLen) {
        const lastChar = val.slice(-1);
        // 最后一个字符是空格（半角/全角空格都识别）
        if(lastChar === ' ' || lastChar === '　') {
            const currentInput = val.trim();
            const wordList = currentInput.split(/\s+/);
            const targetWord = wordList[wordList.length - 1];
            // 仅纯英文单词（含缩写'、连字符-）才朗读，过滤数字、符号、中文
            if(/^[a-zA-Z'-]+$/.test(targetWord) && targetWord.length > 0) {
                // 打断当前正在播放的语音，避免堆积
                speechSynthesis.cancel();
                const utter = createUtterance(targetWord, speechState.rate);
                speechSynthesis.speak(utter);
            }
        }
    }
    // 更新上一次输入值
    prevInputValue = val;

    // 换行进入下一行
    if(e.inputType === 'insertLineBreak' || val.includes('\n')){
        if(!finishedWordSet.has(currentEntryIndex)){
            finishedWordSet.add(currentEntryIndex);
            const userInput = val.replace(/[\n\r]/g, '');
            const inputLen = userInput.length;
            const countLen = inputLen === 0 ? entryLen : inputLen;
            totalInput += countLen;
            currentPos += countLen;
            let wordCorrect = 0;
            for(let i=0;i<inputLen;i++){
                if(i < activeChars.length && userInput[i] === activeChars[i]){
                    wordCorrect++;
                }
            }
            correctCnt += wordCorrect;
        }

        const currentSpans = paragraphContainerEl.querySelectorAll(`[data-segment-index="${currentEntryIndex}"] span`);
        currentSpans.forEach(s => {
            if (s.classList.contains('char-correct') || s.classList.contains('char-wrong')) {
                s.classList.add('char-done');
            }
            s.classList.remove('char-current');
        });

        if(currentEntryIndex < entryCharsList.length -1){
            currentEntryIndex++;
            this.value = '';
            // 换行后重置输入缓存
            prevInputValue = '';
            const newSpans = paragraphContainerEl.querySelectorAll(`[data-segment-index="${currentEntryIndex}"] span`);
            if(newSpans[0]) newSpans[0].className='char-current';
            const container = paragraphContainerEl;
            const firstSpan = newSpans[0];
            if(firstSpan){
                const containerRect = container.getBoundingClientRect();
                const spanRect = firstSpan.getBoundingClientRect();
                const scrollTop = container.scrollTop + (spanRect.top - containerRect.top) - containerRect.height / 2;
                container.scrollTo({top: scrollTop, behavior: 'smooth'});
            }
        }else{
            showFinishModal();
            typingRunning=false;
            inputAreaEl.disabled=true;
            resetBtnEl.disabled=false;
        }
        updateStat();
        return;
    }

    // 限制输入长度不超过当前单词字符数
    if(val.length > entryLen){
        this.value = val.slice(0, entryLen);
        prevInputValue = this.value;
        return;
    }

    const allSpans = paragraphContainerEl.querySelectorAll(`[data-segment-index="${currentEntryIndex}"] span`);
    allSpans.forEach(s=>s.className='char-pending');

    let hasError = false;
    for(let i=0;i<val.length;i++){
        const span = allSpans[i];
        if(val[i] === activeChars[i]){
            span.className = 'char-correct';
        }else{
            span.className = 'char-wrong';
            hasError = true;
        }
    }
    if(val.length < entryLen){
        allSpans[val.length].className = 'char-current';
    }

    // 错误连击处理
    if(hasError){
        comboCount = 0;
        revokeLastSticker();
        wrongContinuous++;
        if(wrongContinuous>=3){
            showErrorHint('放慢速度，仔细看清字符再输入😊');
            wrongContinuous=0;
        }
    }else{
        wrongContinuous=0;
        comboCount++;
        // 连击解锁贴纸动画
        if(comboCount===5){
            unlockSticker(0);
            batchStar(e.clientX,e.clientY,3);
            showComboTip('5连击！很棒',e.clientX,e.clientY-40);
        }else if(comboCount===10){
            unlockSticker(1);
            batchStar(e.clientX,e.clientY,5);
            showComboTip('10连击太厉害了！',e.clientX,e.clientY-40);
        }else if(comboCount===15){
            unlockSticker(2);
            batchStar(e.clientX,e.clientY,7);
            showComboTip('完美15连击🎉',e.clientX,e.clientY-40);
        }else if(comboCount>15){
            createStar(e.clientX,e.clientY);
        }
    }

    const container = paragraphContainerEl;
    const firstSpan = allSpans[0];
    if(firstSpan){
        const containerRect = container.getBoundingClientRect();
        const spanRect = firstSpan.getBoundingClientRect();
        const scrollTop = container.scrollTop + (spanRect.top - containerRect.top) - containerRect.height / 2;
        container.scrollTo({top: scrollTop, behavior: 'smooth'});
    }
    updateStat();
});

resetBtnEl.addEventListener('click',()=>{
    typingRunning=false; clearInterval(timerId);
    startTime=null; speedEl.textContent="0"; accuracyEl.textContent="0%";
    timeUsedEl.textContent="00:00"; progressEl.textContent="0%";
    speedBar.style.width="0%"; accBar.style.width="0%"; progBar.style.width="0%";
    inputAreaEl.value=''; inputAreaEl.disabled=true; resetBtnEl.disabled=true;
    // 重置输入缓存
    prevInputValue = '';
    
    displayAreaEl.innerHTML='<span class="text-slate-400">✨ 请先粘贴练习内容，点击「开始练习」✨</span>';
    displayAreaEl.style.display = 'flex';
    displayAreaEl.classList.remove('hidden');
    bilingualAreaEl.classList.add('hidden');
    isBilingualMode = false;
    isFullTextMode = false;

    comboCount=0; wrongContinuous=0;
    stickerUnlock=[false,false,false,false];
    currentEntryIndex = 0;
    entryCharsList = [];
    finishedWordSet.clear();
    totalInput = 0;
    correctCnt = 0;
    currentPos = 0;
    document.querySelectorAll('.sticker-item').forEach(item=>item.classList.remove('unlock'));
    document.querySelectorAll('.sentence-read-highlight').forEach(el=>el.classList.remove('sentence-read-highlight'));
    const mask = document.getElementById('finishMask');
    if(mask) mask.remove();
});

window.addEventListener('beforeunload',()=>{
    clearTimeout(pauseTimer); speechSynthesis.cancel();
    speechState.running=false; clearInterval(timerId);
});
</script>
